name: Windows 发布

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 发布既有标签，例如 v1.2.3
        required: true
        type: string

permissions:
  contents: write
  actions: read

jobs:
  windows-release:
    name: Windows Release 与 MSIX 发布
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: 配置 Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml

      - name: 获取依赖
        run: flutter pub get

      - name: Dart 格式检查
        run: dart format --output=none --set-exit-if-changed .

      - name: Flutter 静态分析
        run: flutter analyze --no-pub

      - name: Flutter 测试
        run: flutter test --no-pub

      - name: 构建 Windows Release
        run: flutter build windows --release --no-pub

      - name: 校验应用版本与标签
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        shell: pwsh
        run: |
          if ($env:RELEASE_TAG -notmatch '^v[0-9]+\.[0-9]+\.[0-9]+$') { throw "发布标签格式无效: $env:RELEASE_TAG" }
          git show-ref --verify --quiet "refs/tags/$env:RELEASE_TAG"
          if ($LASTEXITCODE -ne 0) { throw "发布标签不存在: $env:RELEASE_TAG" }
          $tagCommit = (git rev-list -n 1 $env:RELEASE_TAG).Trim()
          $headCommit = (git rev-parse HEAD).Trim()
          if ($tagCommit -ne $headCommit) { throw "标签 $env:RELEASE_TAG 未指向当前 HEAD" }

          $pubspec = Get-Content -LiteralPath 'pubspec.yaml' -Raw -Encoding UTF8
          $versionMatch = [regex]::Match($pubspec, '(?m)^version:\s*([0-9]+\.[0-9]+\.[0-9]+)(?:\+[0-9]+)?\s*$')
          $msixMatch = [regex]::Match($pubspec, '(?m)^\s*msix_version:\s*([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+)\s*$')
          if (-not $versionMatch.Success -or -not $msixMatch.Success) { throw '无法从 pubspec.yaml 读取应用版本' }
          $appVersion = $versionMatch.Groups[1].Value.Trim()
          $msixVersion = $msixMatch.Groups[1].Value.Trim()
          if ($env:RELEASE_TAG -ne "v$appVersion") { throw "标签 $env:RELEASE_TAG 与 pubspec 版本 $appVersion 不一致" }
          $expectedMsix = "$appVersion.0"
          if ($msixVersion -ne $expectedMsix) { throw "msix_version $msixVersion 与应用版本 $appVersion 不一致，应为 $expectedMsix" }
          "RELEASE_TAG=$env:RELEASE_TAG" >> $env:GITHUB_ENV
          "APP_VERSION=$appVersion" >> $env:GITHUB_ENV
          "MSIX_VERSION=$msixVersion" >> $env:GITHUB_ENV

      - name: 生成 MSIX
        shell: pwsh
        run: |
          $placeholderCertificate = Join-Path $env:RUNNER_TEMP 'unsigned-placeholder.cer'
          New-Item -Path $placeholderCertificate -ItemType File -Force | Out-Null
          dart run msix:create --sign-msix=false --certificate-path="$placeholderCertificate" --build-windows=false

      - name: 校验 MSIX 清单
        shell: pwsh
        run: |
          $source = Get-ChildItem -LiteralPath 'build/windows/x64/runner/Release' -Filter '*.msix' | Select-Object -First 1
          if ($null -eq $source) { throw '未找到 msix:create 输出' }
          $extract = Join-Path $env:RUNNER_TEMP 'kanyingyin-msix'
          if (Test-Path -LiteralPath $extract) { Remove-Item -LiteralPath $extract -Recurse -Force }
          $archive = Join-Path $env:RUNNER_TEMP 'kanyingyin-msix.zip'
          Copy-Item -LiteralPath $source.FullName -Destination $archive -Force
          Expand-Archive -LiteralPath $archive -DestinationPath $extract
          $manifest = Get-ChildItem -LiteralPath $extract -Filter 'AppxManifest.xml' -Recurse | Select-Object -First 1
          if ($null -eq $manifest) { throw 'MSIX 中未找到 AppxManifest.xml' }
          [xml]$xml = Get-Content -LiteralPath $manifest.FullName -Raw -Encoding UTF8
          $identity = $xml.Package.Identity
          if ($identity.Name -ne 'com.kanyingyin.player') { throw "清单 identity 不匹配: $($identity.Name)" }
          if ($identity.Version -ne $env:MSIX_VERSION) { throw "清单版本 $($identity.Version) 不匹配: $env:MSIX_VERSION" }

      - name: 准备待签名 MSIX
        shell: pwsh
        run: |
          $source = Get-ChildItem -LiteralPath 'build/windows/x64/runner/Release' -Filter '*.msix' | Select-Object -First 1
          $unsignedDirectory = 'build/windows/msix_unsigned_output'
          New-Item -Path $unsignedDirectory -ItemType Directory -Force | Out-Null
          Copy-Item -LiteralPath $source.FullName -Destination "$unsignedDirectory/看影音-$env:APP_VERSION.msix" -Force

      - name: 上传待签名 MSIX
        id: unsigned-msix
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: windows-msix-unsigned
          path: build/windows/msix_unsigned_output/看影音-${{ env.APP_VERSION }}.msix
          if-no-files-found: error

      - name: SignPath 签名 MSIX
        uses: signpath/github-action-submit-signing-request@3c306158facd969ebdb385c6845dee38afc2ebf9 # v1.1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: fa047255-4772-4be1-b14f-5cfa62635877
          project-slug: KanYingYin
          signing-policy-slug: release-signing
          artifact-configuration-slug: MSIX
          github-artifact-id: ${{ steps.unsigned-msix.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: build/windows/msix_signed_output

      - name: 准备签名后的 MSIX
        shell: pwsh
        run: |
          $signed = Get-ChildItem -LiteralPath 'build/windows/msix_signed_output' -Filter '*.msix' -Recurse | Select-Object -First 1
          if ($null -eq $signed) { throw 'SignPath 未返回签名后的 MSIX' }
          $final = Join-Path $env:GITHUB_WORKSPACE "看影音-$env:APP_VERSION.msix"
          Copy-Item -LiteralPath $signed.FullName -Destination $final -Force

      - name: 验证签名后的 MSIX
        shell: pwsh
        run: |
          $signedFiles = @(Get-ChildItem -LiteralPath 'build/windows/msix_signed_output' -Filter '*.msix' -Recurse)
          if ($signedFiles.Count -ne 1) { throw "SignPath 必须恰好返回 1 个 MSIX，实际为 $($signedFiles.Count) 个" }
          $final = Join-Path $env:GITHUB_WORKSPACE "看影音-$env:APP_VERSION.msix"
          if (-not (Test-Path -LiteralPath $final -PathType Leaf)) { throw '签名后的最终 MSIX 不存在' }

          $windowsSdkBin = Join-Path ${env:ProgramFiles(x86)} 'Windows Kits/10/bin'
          $signTool = (Get-Command 'signtool.exe' -ErrorAction SilentlyContinue).Source
          if (-not $signTool) {
            $signTool = Get-ChildItem -LiteralPath $windowsSdkBin -Filter 'signtool.exe' -Recurse |
              Where-Object { $_.FullName -match '\\x64\\signtool\.exe$' } |
              Sort-Object FullName -Descending | Select-Object -First 1 -ExpandProperty FullName
          }
          $makeAppx = (Get-Command 'MakeAppx.exe' -ErrorAction SilentlyContinue).Source
          if (-not $makeAppx) {
            $makeAppx = Get-ChildItem -LiteralPath $windowsSdkBin -Filter 'MakeAppx.exe' -Recurse |
              Where-Object { $_.FullName -match '\\x64\\MakeAppx\.exe$' } |
              Sort-Object FullName -Descending | Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $signTool -or -not $makeAppx) { throw '未找到 Windows SDK 签名验证工具' }

          & $signTool verify /pa /v $final
          if ($LASTEXITCODE -ne 0) { throw 'signtool 验证签名失败' }

          $extract = Join-Path $env:RUNNER_TEMP 'kanyingyin-signed-msix'
          if (Test-Path -LiteralPath $extract) { Remove-Item -LiteralPath $extract -Recurse -Force }
          & $makeAppx unpack /p $final /d $extract /o
          if ($LASTEXITCODE -ne 0) { throw 'MakeAppx 解包签名 MSIX 失败' }
          $manifestPath = Join-Path $extract 'AppxManifest.xml'
          if (-not (Test-Path -LiteralPath $manifestPath -PathType Leaf)) { throw '签名 MSIX 中未找到 AppxManifest.xml' }
          [xml]$manifestXml = Get-Content -LiteralPath $manifestPath -Raw -Encoding UTF8
          $identity = $manifestXml.Package.Identity
          if ($identity.Name -ne 'com.kanyingyin.player') { throw "清单 Identity Name 不匹配: $($identity.Name)" }
          if ($identity.Publisher -ne 'CN=KanYingYin') { throw "清单 Publisher 不匹配: $($identity.Publisher)" }
          if ($identity.Version -ne $env:MSIX_VERSION) { throw "清单 Version 不匹配: $($identity.Version)" }

          $signature = Get-AuthenticodeSignature -LiteralPath $final
          if ($signature.Status -ne 'Valid') { throw "Authenticode 签名状态无效: $($signature.Status)" }
          if ($null -eq $signature.SignerCertificate -or $signature.SignerCertificate.Subject -ne 'CN=KanYingYin') {
            throw "签名者不匹配: $($signature.SignerCertificate.Subject)"
          }

      - name: 发布 GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: 看影音-${{ env.APP_VERSION }}.msix
